declarr:
  formatDbBranch: stable
  formatDbRepo: 'https://github.com/Dictionarry-Hub/Database'
  globalResolvePaths:
    - $.*.config.host.password
    - $.*.config.host.passwordConfirmation
    - $.*.config.host.apiKey
    - $.*.applications.*.fields.apiKey
    - $.*.indexer.*.fields.password
    - $.*.downloadClient.*.fields.password
  stateDir: /var/lib/declarr

jellyfin:
  declarr:
    globalResolvePaths:
    type: jellyfin
    url: https://jellyfin.something.dev
    apiKey: aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa

  libraries:
    Shows:
      collectionType: tvshows
      paths:
        - /raid/media/tv
    Movies:
      collectionType: movies
      paths:
        - /raid/media/movies

  plugins:
    Studio Images:
      RepositoryUrl: "https://raw.githubusercontent.com/jellyfin/emby-artwork/master/studios"
    MusicBrainz:
      Server: "https://musicbrainz.org"
      RateLimit: 1
      ReplaceArtistName: false
    AudioDB:
      ReplaceAlbumName: false
    Intro Skipper:
      AutoDetectIntros: true
      UpdateMediaSegments: true
      CacheFingerprints: true
      ScanCommercial: true
      ScanCredits: true
      ScanIntroduction: true
      ScanPreview: true
      ScanRecap: true
      filetransformationpluginenabled: false
      UseFileTransformationPlugin: false
    Merge Versions: {}
    Streamyfin:
      Config.settings:
        jellyseerrServerUrl:
          locked: true
          value: "https://jellyseerr.upidapi.dev"
        rememberAudioSelections:
          locked: false
          value: true
        rememberSubtitleSelections:
          locked: false
          value: true
    OMDb:
      CastAndCrew: false
    TheTVDB: {}
    TMDb:
      TmdbApiKey: ""
      IncludeAdult: false
      ExcludeTagsSeries: false
      ExcludeTagsMovies: false
      ImportSeasonName: false
      MaxCastMembers: 15
      MaxCrewMembers: 15
      HideMissingCastMembers: false
      HideMissingCrewMembers: false
      PosterSize: "original"
      BackdropSize: "original"
      LogoSize: "original"
      ProfileSize: "original"
      StillSize: "original"

  pluginRepositories:
    Jellyfin Stable:
      enabled: true
      url: "https://repo.jellyfin.org/releases/plugin/manifest-stable.json"
    Intro Skipper:
      enabled: true
      url: "https://manifest.intro-skipper.org/manifest.json"
    Merge Versions Plugin:
      enabled: true
      url: "https://raw.githubusercontent.com/danieladov/JellyfinPluginManifest/master/manifest.json"
    Meilisearch:
      enabled: true
      url: "https://raw.githubusercontent.com/arnesacnussem/jellyfin-plugin-meilisearch/refs/heads/master/manifest.json"
    Air Times:
      enabled: true
      url: "https://raw.githubusercontent.com/apteryxxyz/jellyfin-plugin-airtimes/main/manifest.json"
    InPlayerEpisodePreview:
      enabled: true
      url: "https://raw.githubusercontent.com/Namo2/InPlayerEpisodePreview/master/manifest.json"
    Streamyfin:
      enabled: true
      url: "https://raw.githubusercontent.com/streamyfin/jellyfin-plugin-streamyfin/main/manifest.json"
    Editor's Choice:
      enabled: true
      url: "https://github.com/lachlandcp/jellyfin-editors-choice-plugin/raw/main/manifest.json"
    JS Injector:
      enabled: true
      url: "https://raw.githubusercontent.com/n00bcodr/jellyfin-plugins/main/10.11/manifest.json"
